<!--
  VeteransLedger · Cookie Consent Banner
  Shown until user accepts. State stored in localStorage.
-->
<div id="cookie-banner" class="cookie-banner" hidden>
  <p class="cookie-banner__text">
    This archive uses only essential session cookies for navigation and theme preferences.
    No tracking or analytics cookies are used.
    <a href="/site-policies#privacy" style="color:var(--gold)">Privacy Policy</a>
  </p>
  <div class="cookie-banner__actions">
    <button type="button" class="btn btn-primary" data-cookie-action="accept">Accept</button>
    <button type="button" class="btn btn-secondary" data-cookie-action="dismiss">Dismiss</button>
  </div>
</div>
