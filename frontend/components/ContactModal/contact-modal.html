<!--
  VeteransLedger · Contact Modal — archival document style
  Opened by any [data-action="open-contact"] trigger.
-->
<div id="contact-modal" class="modal-overlay" hidden aria-modal="true" role="dialog"
  aria-labelledby="contact-modal-title">
  <div class="modal archive-modal">

    <!-- Close button -->
    <button type="button" class="modal__close" id="contact-modal-close" aria-label="Close contact form">
      <span aria-hidden="true">&times;</span>
    </button>

    <!-- Modal header: eagle + title -->
    <div class="archive-modal__header">
      <img src="/public/logos/eagle.png" alt="" class="archive-modal__eagle" aria-hidden="true">
      <h2 class="archive-modal__title" id="contact-modal-title">Contact The Archive</h2>
    </div>

    <!-- Two-column body -->
    <div class="archive-modal__body">

      <!-- Left: info panel -->
      <div class="archive-modal__info">
        <p class="archive-modal__info-heading">Direct Communication</p>
        <p class="archive-modal__info-text">
          For inquiries, corrections, document submissions, or collaboration
          requests, please reach out directly.
        </p>
        <div class="archive-modal__info-section">
          <p class="archive-modal__info-label">Archive Email</p>
          <a href="mailto:support@veteransledger.com" class="archive-modal__info-email">
            support@veteransledger.com
          </a>
        </div>

        <!-- Vertraulich stamp -->
        <div class="archive-modal__stamp" aria-hidden="true">
          <span>VERTRAULICH</span>
        </div>
      </div>

      <!-- Right: form -->
      <form class="contact-form archive-modal__form" id="contact-form" novalidate>

        <div class="contact-form__group">
          <label class="contact-form__label" for="contact-to">
            <span class="contact-form__label-icon" aria-hidden="true">✉</span> TO
          </label>
          <input type="email" id="contact-to" name="to" class="contact-form__input" value="support@veteransledger.com"
            readonly>
        </div>

        <div class="contact-form__group">
          <label class="contact-form__label" for="contact-subject">
            <span class="contact-form__label-icon" aria-hidden="true">✏</span> SUBJECT
          </label>
          <input type="text" id="contact-subject" name="subject" class="contact-form__input"
            placeholder="Enter subject…" maxlength="120" required>
        </div>

        <div class="contact-form__group">
          <label class="contact-form__label" for="contact-message">
            <span class="contact-form__label-icon" aria-hidden="true">≡</span> MESSAGE
          </label>
          <textarea id="contact-message" name="message" class="contact-form__textarea"
            placeholder="Type your message here…" minlength="20" maxlength="2000" required></textarea>
          <p class="contact-form__counter">
            <span id="contact-char-count">0</span> / 30 minimum characters
          </p>
        </div>

        <div class="archive-modal__form-footer">
          <button type="submit" class="btn btn-primary contact-form__submit">
            Send Message <span aria-hidden="true">›</span>
          </button>
        </div>

        <div id="contact-status" class="contact-form__status" role="status" aria-live="polite"></div>
      </form>
    </div>

  </div>
</div>
</content>
