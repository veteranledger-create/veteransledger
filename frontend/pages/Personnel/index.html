<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="VeteransLedger Personnel — Profiles, units, and biographies of Axis military personnel.">
  <title>Personnel · VeteransLedger</title>

  <link rel="icon" type="image/png" href="/public/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="/styles/core.css">
  <link rel="stylesheet" href="/styles/navigation.css">
  <link rel="stylesheet" href="/styles/footer.css">
  <link rel="stylesheet" href="/styles/hero.css">
  <link rel="stylesheet" href="/styles/cards.css">
  <link rel="stylesheet" href="/styles/archive.css">
  <link rel="stylesheet" href="/styles/contact-modal.css">
  <link rel="stylesheet" href="/styles/pages/personnel.css">
</head>

<body>

  <main id="main-content">

    <div class="page-hero personnel-hero">
      <div class="page-hero__bg" style="background-image:url('/public/images/covers/personnel-cover.webp')"></div>
      <div class="page-hero__overlay"></div>
      <div class="page-hero__content">
        <h1 class="page-hero__title">Personnel</h1>
        <p class="page-hero__subtitle">Military Biographical Archive</p>
      </div>
    </div>

    <div class="archive-section">

      <div class="filter-bar">
        <span class="filter-bar__label">Branch:</span>
        <button type="button" class="filter-btn is-active" data-branch="all">All</button>
        <button type="button" class="filter-btn" data-branch="army">Heer (Army)</button>
        <button type="button" class="filter-btn" data-branch="luftwaffe">Luftwaffe</button>
        <button type="button" class="filter-btn" data-branch="kriegsmarine">Kriegsmarine</button>
        <button type="button" class="filter-btn" data-branch="waffen-ss">Waffen-SS</button>
        <button type="button" class="filter-btn" data-branch="foreign">Foreign Volunteers</button>
      </div>

      <div id="army" class="anchor-section branch-section">
        <div class="branch-header">
          <h2 class="branch-header__name">Heer (Army)</h2>
          <span class="branch-header__count" id="army-count"></span>
        </div>
        <div class="personnel-grid" id="army-grid">
          <div class="loader"><span class="loader__dot"></span><span class="loader__dot"></span><span
              class="loader__dot"></span></div>
        </div>
      </div>

      <div id="luftwaffe" class="anchor-section branch-section">
        <div class="branch-header">
          <h2 class="branch-header__name">Luftwaffe</h2>
          <span class="branch-header__count" id="luftwaffe-count"></span>
        </div>
        <div class="personnel-grid" id="luftwaffe-grid">
          <div class="loader"><span class="loader__dot"></span><span class="loader__dot"></span><span
              class="loader__dot"></span></div>
        </div>
      </div>

      <div id="kriegsmarine" class="anchor-section branch-section">
        <div class="branch-header">
          <h2 class="branch-header__name">Kriegsmarine</h2>
          <span class="branch-header__count" id="kriegsmarine-count"></span>
        </div>
        <div class="personnel-grid" id="kriegsmarine-grid">
          <div class="loader"><span class="loader__dot"></span><span class="loader__dot"></span><span
              class="loader__dot"></span></div>
        </div>
      </div>

      <div id="waffen-ss" class="anchor-section branch-section">
        <div class="branch-header">
          <h2 class="branch-header__name">Waffen-SS</h2>
          <span class="branch-header__count" id="waffenss-count"></span>
        </div>
        <div class="personnel-grid" id="waffenss-grid">
          <div class="loader"><span class="loader__dot"></span><span class="loader__dot"></span><span
              class="loader__dot"></span></div>
        </div>
      </div>

      <div id="foreign" class="anchor-section branch-section">
        <div class="branch-header">
          <h2 class="branch-header__name">Foreign Volunteers</h2>
          <span class="branch-header__count" id="foreign-count"></span>
        </div>
        <div class="personnel-grid" id="foreign-grid">
          <div class="loader"><span class="loader__dot"></span><span class="loader__dot"></span><span
              class="loader__dot"></span></div>
        </div>
      </div>

    </div>
  </main>

  <script type="module" src="/layouts/MainLayout/layout.js"></script>
  <script type="module" src="/pages/Personnel/personnel.js"></script>
</body>

</html>
