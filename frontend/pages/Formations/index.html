<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="VeteransLedger Formations — Historical archive of Axis military formations: army groups, armies, corps, divisions, fleets, and volunteer units.">
  <title>Formations · VeteransLedger</title>

  <link rel="icon" type="image/png" href="/public/images/logos/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="/styles/core.css">
  <link rel="stylesheet" href="/styles/navigation.css">
  <link rel="stylesheet" href="/styles/footer.css">
  <link rel="stylesheet" href="/styles/hero.css">
  <link rel="stylesheet" href="/styles/cards.css">
  <link rel="stylesheet" href="/styles/archive.css">
  <link rel="stylesheet" href="/styles/contact-modal.css">
  <link rel="stylesheet" href="/styles/pages/campaigns.css">
</head>

<body>

  <main id="main-content">

    <section class="page-hero" aria-label="Formations">
      <div class="page-hero__bg" style="background-image:url('/public/images/covers/campaings-cover.webp')"></div>
      <div class="page-hero__overlay"></div>
      <div class="page-hero__content">
        <h1 class="page-hero__title">Formations</h1>
        <p class="page-hero__subtitle">Nations &amp; Military Formations Archive</p>
      </div>
    </section>

    <div class="archive-section">
      <div class="anchor-section theater-section">
        <div class="archive-section__header">
          <div>
            <div class="section-label">Military Formations</div>
          </div>
          <div class="nation-tabs-wrap" id="section-nav">
            <div class="nation-tabs-row">
              <span class="nation-tabs__group-label">Primary</span>
              <div class="nation-tabs">
                <button type="button" class="nation-tab is-active" data-section="army-groups">Army Groups</button>
                <button type="button" class="nation-tab" data-section="armies">Armies</button>
                <button type="button" class="nation-tab" data-section="corps">Corps</button>
                <button type="button" class="nation-tab" data-section="divisions">Divisions</button>
                <button type="button" class="nation-tab" data-section="brigades">Brigades</button>
                <button type="button" class="nation-tab" data-section="regiments">Regiments</button>
                <button type="button" class="nation-tab" data-section="battalions">Battalions</button>
                <button type="button" class="nation-tab" data-section="companies">Companies</button>
              </div>
            </div>
            <div class="nation-tabs-row">
              <span class="nation-tabs__group-label">Special</span>
              <div class="nation-tabs">
                <button type="button" class="nation-tab" data-section="waffen-ss">Waffen-SS</button>
                <button type="button" class="nation-tab" data-section="luftwaffe">Luftwaffe</button>
                <button type="button" class="nation-tab" data-section="kriegsmarine">Kriegsmarine</button>
                <button type="button" class="nation-tab" data-section="volunteers">Volunteers</button>
                <button type="button" class="nation-tab" data-section="allies">Axis Allies</button>
              </div>
            </div>
          </div>
        </div>

        <div class="record-grid" id="formations-grid">
          <div class="loader">
            <span class="loader__dot"></span><span class="loader__dot"></span><span class="loader__dot"></span>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script type="module" src="/layouts/MainLayout/layout.js"></script>
  <script type="module" src="/pages/Formations/formations.js"></script>
</body>

</html>
