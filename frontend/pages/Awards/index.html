<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VeteransLedger Awards &amp; Decorations — Military awards, medals, and decorations of the Axis powers in World War II.">
  <title>Awards &amp; Decorations · VeteransLedger</title>

  <link rel="icon" type="image/png" href="/public/images/logos/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="/styles/core.css">
  <link rel="stylesheet" href="/styles/navigation.css">
  <link rel="stylesheet" href="/styles/footer.css">
  <link rel="stylesheet" href="/styles/hero.css">
  <link rel="stylesheet" href="/styles/archive.css">
  <link rel="stylesheet" href="/styles/contact-modal.css">
</head>

<body>

  <main id="main-content">

    <div class="page-hero">
      <div class="page-hero__bg" style="background-image:url('/public/images/covers/placeholder-cards.webp')"></div>
      <div class="page-hero__overlay"></div>
      <div class="page-hero__content">
        <h1 class="page-hero__title">Awards &amp; Decorations</h1>
        <p class="page-hero__subtitle">Military Honours of the Axis Powers</p>
      </div>

    <div class="archive-section">
      <div id="awards-loader" class="loader"><span class="loader__dot"></span><span class="loader__dot"></span><span class="loader__dot"></span></div>
      <div id="awards-grid" class="archive-grid" hidden></div>
      <p id="awards-empty" style="color:var(--text-muted);text-align:center;padding:var(--space-12) 0;" hidden>No awards published yet.</p>
    </div>

  </main>

  <script type="module" src="/layouts/MainLayout/layout.js"></script>
  <script type="module" src="/pages/Awards/awards.js"></script>
